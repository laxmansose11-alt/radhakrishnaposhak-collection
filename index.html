<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Radha Krishna Collection</title>

<style>
body {margin:0;font-family:Arial;background:#f5f5f5;}
header {background:#ff5e62;color:#fff;padding:15px;text-align:center;font-size:22px;}

.products {
display:grid;
grid-template-columns: repeat(auto-fit,minmax(180px,1fr));
gap:15px;
padding:15px;
}

.card {
background:white;
padding:10px;
border-radius:10px;
text-align:center;
box-shadow:0 2px 8px rgba(0,0,0,0.1);
}

img {width:100%;border-radius:8px;}

.price {color:green;font-weight:bold;}

.btn {
padding:8px;
border:none;
width:100%;
margin-top:5px;
border-radius:5px;
cursor:pointer;
}

.cart-btn {background:#ff5e62;color:white;}
.whatsapp-btn {background:#25D366;color:white;}

.cart {
position:fixed;
top:10px;
right:10px;
background:black;
color:white;
padding:8px 12px;
border-radius:20px;
}
</style>
</head>

<body>

<header>Radha Krishna Collection</header>

<div class="cart">Cart: <span id="count">0</span></div>

<div class="products" id="productList"></div>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/12.12.1/firebase-app.js";
import { getFirestore, collection, getDocs } from "https://www.gstatic.com/firebasejs/12.12.1/firebase-firestore.js";

const firebaseConfig = {
  apiKey: "AIzaSyCgYqzZOL7X6Z2nGcFGDGnR1NbrqLhi_Rg",
  authDomain: "rkp-collection-store.firebaseapp.com",
  projectId: "rkp-collection-store",
  storageBucket: "rkp-collection-store.firebasestorage.app",
  messagingSenderId: "983842117212",
  appId: "1:983842117212:web:0c82b694b69db4b5a77899"
};

const app = initializeApp(firebaseConfig);
const db = getFirestore(app);

async function loadProducts() {
  const querySnapshot = await getDocs(collection(db, "product"));
  let html = "";

  querySnapshot.forEach((doc) => {
    const data = doc.data();

    html += `
      <div class="card">
        <img src="${data.image}">
        <h3>${data.name}</h3>
        <p class="price">₹${data.price}</p>
        <button class="btn cart-btn" onclick="addCart()">Add to Cart</button>
        <button class="btn whatsapp-btn" onclick="order('${data.name}')">Order on WhatsApp</button>
      </div>
    `;
  });

  document.getElementById("productList").innerHTML = html;
}

window.addCart = function(){
  let count = document.getElementById("count");
  count.innerText = Number(count.innerText) + 1;
}

window.order = function(name){
  let number = "919322151932";
  let url = "https://wa.me/"+number+"?text=I want to order "+name;
  window.open(url);
}

loadProducts();
</script>

</body>
</html>
