<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Radha Krishna Poshak | Laddu Gopal Dress</title>

<style>
body {margin:0;font-family:Arial;background:#f5f5f5;}
header {background:#ff5e62;color:#fff;padding:15px;text-align:center;font-size:22px;}

.products {
display:grid;
grid-template-columns: repeat(auto-fit,minmax(180px,1fr));
gap:15px;
padding:15px;
}

.card {
background:white;
padding:10px;
border-radius:10px;
text-align:center;
box-shadow:0 2px 8px rgba(0,0,0,0.1);
}

img {width:100%;border-radius:8px;}

.price {color:green;font-weight:bold;}

.btn {
padding:8px;
border:none;
width:100%;
margin-top:5px;
border-radius:5px;
cursor:pointer;
}

.cart-btn {background:#ff5e62;color:white;}
.whatsapp-btn {background:#25D366;color:white;}

.cart {
position:fixed;
top:10px;
right:10px;
background:black;
color:white;
padding:8px 12px;
border-radius:20px;
}
</style>
</head>

<body>

<header>Radha Krishna Collection</header>

<div class="cart">Cart: <span id="count">0</span></div>

<div class="products" id="productList"></div>

<script>
let cart = 0;
let number = "919876543210"; // 👈 अपना नंबर डालना

function loadProducts(){
let data = JSON.parse(localStorage.getItem("products")) || [];
let html = "";

data.forEach((p)=>{
html += `
<div class="card">
<img src="${p.img}">
<h3>${p.name}</h3>
<p class="price">₹${p.price}</p>
<button class="btn cart-btn" onclick="addCart()">Add to Cart</button>
<button class="btn whatsapp-btn" onclick="order('${p.name}')">Order on WhatsApp</button>
</div>
`;
});

document.getElementById("productList").innerHTML = html;
}

function addCart(){
cart++;
document.getElementById("count").innerText = cart;
}

function order(name){
let url = "https://wa.me/"+number+"?text=I want to order "+name;
window.open(url);
}

loadProducts();
</script>
